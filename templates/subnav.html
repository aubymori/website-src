{% extends "two_col_page.html" %}

{% block col_one_content %}
<span class="header-small">{{ subnav.title }}</span>
<ul class="subnav">
    {% for item in subnav.items %}
    <li class="subnav-item {{ item.selected ? "selected" }}">
        {% if item.selected %}
        <span>{{ item.title }}</span>
        {% else %}
        <a href="{{ item.url }}">{{ item.title }}</a>
        {% endif %}
    </li>
    {% endfor %}
</ul>
{% endblock %}
